<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="board-header">
            <h1>📋 Task Kanban <span id="task-counter">0</span></h1>
            <div class="controls">
                <label for="priority-filter">Priority Filter:</label>
                <select id="priority-filter">
                    <option value="all">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
        </header>

        <div class="board-columns">
            <section id="todo" class="column">
                <h2>📝 To Do</h2>
                <ul id="todoList" class="task-list"></ul>
                <button class="add-btn" data-column="todo">+ Add Task</button>
            </section>

            <section id="inprogress" class="column">
                <h2>⚙️ In Progress</h2>
                <ul id="inProgressList" class="task-list"></ul>
                <button class="add-btn" data-column="inprogress">+ Add Task</button>
            </section>

            <section id="done" class="column">
                <h2>✅ Done</h2>
                <ul id="doneList" class="task-list"></ul>
                <button class="add-btn" data-column="done">+ Add Task</button>
                <button id="clearDoneBtn" class="clear-btn">Clear All</button>
            </section>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add/Edit Task</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="taskTitle" placeholder="Enter task title">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="taskDesc" placeholder="Enter description"></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="taskDueDate">
            </div>
            <div class="modal-actions">
                <button id="saveTaskBtn">Save</button>
                <button id="cancelModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
